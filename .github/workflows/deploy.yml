name: Build and push to ECR

# Application repo CI/CD. Authenticates to AWS with GitHub OIDC (no long-lived
# keys) and pushes the image to ECR. Pushing :latest is what the infrastructure
# repo's CodePipeline watches for — it then runs the CodeDeploy blue/green
# rollout onto ECS. This workflow never talks to ECS/CodeDeploy directly.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  build-and-push:
    name: Build image and push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: mvn -B verify

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker tag "$REGISTRY/$REPOSITORY:$IMAGE_TAG" "$REGISTRY/$REPOSITORY:latest"
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"
          echo "Pushed $REGISTRY/$REPOSITORY:$IMAGE_TAG and :latest"

      - name: Deployment triggered
        run: |
          echo "::notice::Image pushed. CodePipeline (blue/green via CodeDeploy) starts automatically from the ECR push event."
