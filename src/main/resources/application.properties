spring.application.name=photo-gallery

# Binds :80 in the container (matches the ECS task / ALB target group); override
# with SERVER_PORT locally if 80 is privileged on your machine.
server.port=${SERVER_PORT:80}

# Track sessions by cookie only — never rewrite ;jsessionid into URLs (it leaks
# the session id into logs/referrers and breaks cookie-less clients on redirect).
server.servlet.session.tracking-modes=cookie

# Uploads. Keep the limits in sync with the friendly message in PhotoService.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# JPA / Hibernate. ddl-auto=update creates the photos table on first boot so the
# lab needs no migration step; switch to validate + Flyway for a real deployment.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator: a separate machine-readable health endpoint (the ALB itself checks /).
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
